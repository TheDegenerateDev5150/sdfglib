name: LLVM - Unit and Integration Sanitized Tests

on:
  push:
    branches:
      - main
  # TODO: remove pull_requests
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  schedule:
    - cron: "0 4 * * *"

jobs:
  llvm-tests-linux-san:
    runs-on:
      group: dahlia
      labels: Linux
    container:
      image: daisytuner/docc-build-env-llvm19-ubuntu-24.04:latest-amd64
    strategy:
      matrix:
        san: ["address", "leak", "undefined"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark GitHub Actions workdir as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSDFG_ENABLE_SANITIZER=ON \
            -DSDFG_SANITIZER=${{ matrix.san }} \
            -DLLVM_BUILD_FRONTEND=ON \
            -DLLVM_BUILD_TESTS=ON \
            -DSDFG_BUILD_TESTS=OFF \
            -DINSTALL_GTEST=OFF \
            -DBUILD_TESTS:BOOL=OFF \
            -DBUILD_BENCHMARKS:BOOL=OFF \
            -DBUILD_BENCHMARKS_GOOGLE:BOOL=OFF \
            ..
          ninja -j$(nproc)

      - name: Unit Tests
        run: |
          cd build
          ./llvm/tests/docc_llvm_pass_test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup virtual environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

          python -m pip install --upgrade pip
          pip install pytest==7.1.3 pytest-parallel lit

      - name: Integration Tests
        run: |
          export PATH=$PATH:$GITHUB_WORKSPACE/build/llvm/driver
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$GITHUB_WORKSPACE/build/llvm
          export LIBRARY_PATH=$LIBRARY_PATH:$GITHUB_WORKSPACE/build/rtl
          export LIBRARY_PATH=$LIBRARY_PATH:$GITHUB_WORKSPACE/build/arg-capture-io
          export CPATH=$CPATH:$GITHUB_WORKSPACE/rtl/include
          export LLVM_SYMBOLIZER_PATH=$(which llvm-symbolizer-19)

          cd llvm/integration
          pytest -v llvm_test_suite.py