name: Unit Tests (Linux)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  schedule:
    - cron: "0 4 * * *"

jobs:
  cpp-tests-linux:
    runs-on:
      group: dahlia
      labels: RTX5060
    container:
      image: daisytuner/docc-build-env-llvm19-ubuntu-24.04-et:latest
      options: >-
        --cap-add=PERFMON
        --gpus=all

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark GitHub Actions workdir as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Formatting
        shell: bash
        run: |
          shopt -s globstar
          clang-format-19 -style=file --dry-run --Werror sdfg/include/**/*.h sdfg/src/**/*.cpp sdfg/tests/**/*.cpp
          clang-format-19 -style=file --dry-run --Werror opt/include/**/*.h opt/src/**/*.cpp opt/tests/**/*.cpp

      - name: Build
        run: |
          mkdir build
          cd build
          cmake \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSDFG_ENABLE_COVERAGE=ON \
            -DBUILD_TESTS:BOOL=OFF \
            -DBUILD_BENCHMARKS:BOOL=OFF \
            -DBUILD_BENCHMARKS_GOOGLE:BOOL=OFF  \
            -DDOCC_BUILD_TARGET_ET=ON \
            -DCMAKE_PREFIX_PATH=/opt/et \
            ..
          ninja -j$(nproc)
          ninja install

      - name: Unit Tests
        run: |
          cd build/
          LLVM_PROFILE_FILE="sdfglib_test.profraw" ./sdfg/tests/sdfglib_test
          LLVM_PROFILE_FILE="sdfgopt_test.profraw" ./opt/tests/sdfgopt_test
          LLVM_PROFILE_FILE="docc-target-et_test.profraw" ./targets/et/tests/docc-target-et_test
          ./tutorial/printf_target/tests/printf_target_test

          # Run coverage
          llvm-profdata-19 merge -sparse sdfglib_test.profraw sdfgopt_test.profraw docc-target-et_test.profraw -o default.profdata
          cd ../
          llvm-cov-19 export ./build/sdfg/tests/sdfglib_test -object ./build/opt/tests/sdfgopt_test -object ./build/targets/et/tests/docc-target-et_test -instr-profile=build/default.profdata -format=lcov > build/coverage_full.lcov
          lcov --ignore-errors unused --extract build/coverage_full.lcov '*/sdfg/src/*' '*/sdfg/include/*' '*/opt/src/*' '*/opt/include/*' '*/targets/et/src/*' '*/targets/et/include/*' --output-file build/coverage.lcov

      - name: Test Arg-Capture-IO
        run: |
          cd build
          ./arg-capture-io/tests/capture_io_test

      - name: Test RTL
        run: |
          export CPATH=/usr/local/include:$CPATH
          export LIBRARY_PATH=/usr/local/lib:$LIBRARY_PATH
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export PATH=/usr/local/bin:$PATH

          pip install pytest==7.1.3 --break-system-packages
          pip install pytest-parallel --break-system-packages

          cd rtl/tests
          pytest -v -s rtl_tests.py

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: sdfg
          parallel: true
          format: lcov
          file: build/coverage.lcov

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Node dependencies for transfer server
        working-directory: ${{ github.workspace }}/examples/transfer-server
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Start transfer server and run RPC tests
        working-directory: ${{ github.workspace }}
        env:
          SDFG_TEST_SDFG_PATH: ${{ github.workspace }}/examples/input/transfertuning/matmul_sdfg.json
          SDFG_TEST_SEQUENCE_PATH: ${{ github.workspace }}/examples/input/transfertuning/matmul_sequence.json
        shell: bash
        run: |
          set -e

          # Start the Node transfer server in the background
          cd examples/transfer-server
          npm run dev &
          SERVER_PID=$!

          # Give the server a moment to start
          sleep 5

          # Run RPC unit tests (sdfgrpc_test links against the local transfer transform)
          cd "$GITHUB_WORKSPACE/build"
          ./rpc/tests/sdfgrpc_test

          # Shut down the server
          kill "$SERVER_PID" || true

  python-tests-linux:
    runs-on:
      group: dahlia
      labels: cuda
    container:
      image: daisytuner/docc-build-env-llvm19-ubuntu-24.04-et:latest
      options: >-
        --cap-add=PERFMON
        --gpus=all
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Mark GitHub Actions workdir as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 pytest coverage black==25.9.0 build scikit-build-core
          pip install numpy scipy ml_dtypes

      - name: Formatting
        shell: bash
        run: |
          shopt -s globstar
          clang-format-19 -style=file --dry-run --Werror python/bindings/**/*.h python/bindings/**/*.cpp
          black --check python/docc/ python/tests/

      - name: Build
        run: |
          # scikit sets this internally to find pybind, so cannot override via -Ccmake
          export CMAKE_PREFIX_PATH=/opt/et

          pip install --no-build-isolation \
            -Ccmake.build-type=Debug \
            -Ccmake.define.DOCC_BUILD_TARGET_ET=ON \
            -v -e python/

      - name: Unit Tests
        env:
          DOCC_ACCESS_TOKEN: ${{ secrets.DOCC_CI_TOKEN }}
        run: |
          nvidia-smi
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH

          export ETSOC_TESTS=1
          coverage run --source=python/docc -m pytest -v python/tests
          coverage xml

      - name: Integration Tests
        run: |
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH

          pytest -v python/benchmarks/

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: python-${{ matrix.python-version }}
          parallel: true
          format: cobertura
          file: coverage.xml

  mlir-tests-linux:
    runs-on:
      group: dahlia
      labels: Linux
    container:
      image: daisytuner/docc-build-env-llvm19-base:latest-amd64
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "PYTHONPATH=$PWD/python:$PWD/mlir" >> $GITHUB_ENV

      - name: Mark GitHub Actions workdir as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 pytest coverage black==25.9.0 build scikit-build-core
          pip install numpy scipy ml_dtypes

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPYTHON_BUILD_FRONTEND=ON \
            -Dpybind11_DIR=$GITHUB_WORKSPACE/.venv/lib/python${{ matrix.python-version }}/site-packages/pybind11/share/cmake/pybind11 \
            -DMLIR_BUILD_FRONTEND=ON \
            -DMLIR_BUILD_BINDINGS=ON \
            -DMLIR_BUILD_TESTS=ON \
            -DMLIR_DIR=/usr/lib/llvm-19/lib/cmake/mlir \
            -DLLVM_EXTERNAL_LIT=/usr/lib/llvm-19/build/utils/lit/lit.py \
            -DINSTALL_GTEST=OFF \
            -DBUILD_TESTS:BOOL=OFF \
            -DBUILD_BENCHMARKS:BOOL=OFF \
            -DBUILD_BENCHMARKS_GOOGLE:BOOL=OFF \
            ..
          ninja -j$(nproc)

      - name: Unit Tests
        run: |
          cd build/
          ninja check-docc-mlir

      - name: Integration Tests
        if: matrix.python-version == '3.11' || matrix.python-version == '3.12'
        run: |
          pip install -r mlir/requirements.txt

          cd mlir/
          pytest -v integration/

      - name: Model Zoo Tests (Nightly only)
        if: (matrix.python-version == '3.11' || matrix.python-version == '3.12') && github.event_name == 'schedule'
        run: |
          # Install additional dependencies for model zoo tests
          pip install transformers pillow requests matplotlib

          # Run fasterrcnn test (will fail if assertions don't pass)
          cd mlir/benchmarks/torch/model_zoo/
          python fasterrcnn_resnet50.py

  llvm-tests-linux:
    runs-on:
      group: dahlia
      labels: Linux
    container:
      image: daisytuner/docc-build-env-llvm19-base:latest-amd64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark GitHub Actions workdir as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Formatting
        shell: bash
        run: |
          shopt -s globstar
          clang-format-19 -style=file --dry-run --Werror llvm/include/**/*.h llvm/src/**/*.cpp llvm/tests/**/*.cpp llvm/driver/**/*.cpp

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSDFG_ENABLE_COVERAGE=ON \
            -DLLVM_BUILD_FRONTEND=ON \
            -DLLVM_BUILD_TESTS=ON \
            -DINSTALL_GTEST=OFF \
            -DBUILD_TESTS:BOOL=OFF \
            -DBUILD_BENCHMARKS:BOOL=OFF \
            -DBUILD_BENCHMARKS_GOOGLE:BOOL=OFF \
            ..
          ninja -j$(nproc)
          cpack -G DEB
          apt-get install -y ./docc-llvm*.deb

      - name: Unit Tests
        run: |
          cd build
          LLVM_PROFILE_FILE="docc_llvm_pass_test.profraw" ./llvm/tests/docc_llvm_pass_test

          # Run coverage
          llvm-profdata-19 merge -sparse docc_llvm_pass_test.profraw -o default.profdata
          cd ../
          llvm-cov-19 export ./build/llvm/tests/docc_llvm_pass_test -instr-profile=build/default.profdata -format=lcov > build/coverage_full.lcov
          lcov --ignore-errors unused --extract build/coverage_full.lcov '*/llvm/src/*' '*/llvm/include/*' --output-file build/coverage.lcov

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          flag-name: llvm
          parallel: true
          format: lcov
          file: build/coverage.lcov

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup virtual environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

          python -m pip install --upgrade pip
          pip install pytest==7.1.3 pytest-parallel lit

      - name: Integration Tests
        run: |
          export LLVM_SYMBOLIZER_PATH=$(which llvm-symbolizer-19)

          cd llvm/integration
          pytest -v llvm_test_suite.py

  finish:
    needs: [cpp-tests-linux, python-tests-linux, mlir-tests-linux, llvm-tests-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
