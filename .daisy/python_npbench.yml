on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

parameters:
  container: daisytuner/docc-run-env-llvm19-ubuntu-24.04:latest-amd64
  timeout: 120
  partitions:
    - zinnia

steps:
  build: |
    apt-get install -y python3-venv python3-pip

    python3 -m venv venv
    . venv/bin/activate

    python -m pip install --upgrade pip
    pip install pybind11 pytest coverage black==25.9.0 build scikit-build-core
    pip install numpy scipy cupy-cuda12x

    pip install --no-build-isolation -v -e python/

    export DOCC_CI=
    export DOCC_DEBUG=dump

    venv/bin/python3 python/benchmarks/npbench/polybench/test_adi.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_adi.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_adi.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_atax.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_atax.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_atax.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_gemm.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_gemm.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_gemm.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_gesummv.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_gesummv.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_gesummv.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_gemver.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_gemver.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_gemver.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_k2mm.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_k2mm.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_k2mm.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_k3mm.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_k3mm.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_k3mm.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_mvt.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_mvt.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_mvt.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_symm.py --docc --size=M --n_runs=1 --target=openmp
    # venv/bin/python3 python/benchmarks/npbench/polybench/test_symm.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_symm.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_syr2k.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_syr2k.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_syr2k.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_syrk.py --docc --size=M --n_runs=1 --target=openmp
    venv/bin/python3 python/benchmarks/npbench/polybench/test_syrk.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_syrk.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

    venv/bin/python3 python/benchmarks/npbench/polybench/test_trmm.py --docc --size=M --n_runs=1 --target=openmp
    # venv/bin/python3 python/benchmarks/npbench/polybench/test_trmm.py --docc --size=M --n_runs=1 --target=cuda
    venv/bin/python3 python/benchmarks/npbench/polybench/test_trmm.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning

  run:
    adi:
      energy: true
      env:
        DOCC_CI: ""
        DOCC_REUSE_BINARIES: 1
      variants:
        numpy:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_adi.py --numpy --size=M --n_runs=1
          tags: { framework: numpy, device: cpu, model: openmp, precision: double, baseline: true }
        docc-sequential:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_adi.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning
          tags: { framework: docc, device: cpu, model: sequential, precision: double }
        docc-omp:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_adi.py --docc --size=M --n_runs=1 --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: double }
        docc-cuda:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_adi.py --docc --size=M --n_runs=1 --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: double }
    atax:
      energy: true
      env:
        DOCC_CI: ""
        DOCC_REUSE_BINARIES: 1
      variants:
        numpy:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_atax.py --numpy --size=M --n_runs=1
          tags: { framework: numpy, device: cpu, model: openmp, precision: double, baseline: true }
        docc-sequential:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_atax.py --docc --size=M --n_runs=1 --target=sequential --remote-tuning
          tags: { framework: docc, device: cpu, model: sequential, precision: double }
        docc-omp:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_atax.py --docc --size=M --n_runs=1 --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: double }
        docc-cuda:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_atax.py --docc --size=M --n_runs=1 --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: double }
    gemm:
      energy: true
      env:
        DOCC_CI: ""
        DOCC_REUSE_BINARIES: 1
      variants:
        numpy:
          command: venv/bin/python3 python/benchmarks/npbench/polybench/test_gemm.py --numpy --size=M --n_runs=1
