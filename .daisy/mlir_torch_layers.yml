on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

parameters:
  container: daisytuner/docc-run-env-llvm19-ubuntu-24.04:latest-amd64
  timeout: 150
  partitions:
    - chamomile

steps:
  build: |
    python3.11 -m venv venv
    . venv/bin/activate

    python -m pip install --upgrade pip
    pip install pybind11 pytest coverage black==25.9.0 build scikit-build-core
    pip install numpy scipy cupy-cuda12x

    pip install --no-build-isolation -e python/
    pip install --no-build-isolation -e mlir/

    pip install -r mlir/requirements.txt
    pip uninstall -y torch torchvision
    pip install torch torchvision --index-url https://download.pytorch.org/whl/cu126

    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --n_runs=1 --device docc --target=none
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --n_runs=1 --device docc --target=sequential
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --n_runs=1 --device docc --target=openmp
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --n_runs=1 --device docc --target=cuda

    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --n_runs=1 --device docc --target=none
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --n_runs=1 --device docc --target=sequential
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --n_runs=1 --device docc --target=openmp
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --n_runs=1 --device docc --target=cuda

    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --n_runs=1 --device docc --target=none
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --n_runs=1 --device docc --target=sequential
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --n_runs=1 --device docc --target=openmp
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --n_runs=1 --device docc --target=cuda

    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --n_runs=1 --device docc --target=none
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --n_runs=1 --device docc --target=sequential
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --n_runs=1 --device docc --target=openmp
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --n_runs=1 --device docc --target=cuda

    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --n_runs=1 --device docc --target=none
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --n_runs=1 --device docc --target=sequential
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --n_runs=1 --device docc --target=openmp
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --n_runs=1 --device docc --target=cuda

    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --n_runs=1 --device docc --target=none
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --n_runs=1 --device docc --target=sequential
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --n_runs=1 --device docc --target=openmp
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --n_runs=1 --device docc --target=cuda

  run:

    # layer batchnorm
    batchnorm:
      energy: true
      measurements: 3
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
      variants:
        torch:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --torch
          tags: { framework: torch, device: cpu, model: openmp, precision: float, baseline: true }
        # none:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --device docc --target=none
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        # sequential:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --device docc --target=sequential
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        openmp:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --device docc --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: float }
        cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --device docc --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: float }

    # layer conv2d
    conv2d:
      energy: true
      measurements: 3
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
      variants:
        torch:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --torch
          tags: { framework: torch, device: cpu, model: openmp, precision: float, baseline: true }
        # none:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --device docc --target=none
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        # sequential:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --device docc --target=sequential
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        openmp:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --device docc --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: float }
        cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/conv2d.py --device docc --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: float }

    # layer linear
    linear:
      energy: true
      measurements: 3
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
      variants:
        torch:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --torch
          tags: { framework: torch, device: cpu, model: openmp, precision: float, baseline: true }
        # none:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --device docc --target=none
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        # sequential:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --device docc --target=sequential
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        openmp:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --device docc --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: float }
        cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/linear.py --device docc --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: float }

    # layer matmul
    matmul:
      energy: true
      measurements: 3
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
      variants:
        torch:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --torch
          tags: { framework: torch, device: cpu, model: openmp, precision: float, baseline: true }
        # none:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --device docc --target=none
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        # sequential:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --device docc --target=sequential
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        openmp:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --device docc --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: float }
        cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/matmul.py --device docc --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: float }

    # layer pooling
    pooling:
      energy: true
      measurements: 3
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
      variants:
        torch:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --torch
          tags: { framework: torch, device: cpu, model: openmp, precision: float, baseline: true }
        # none:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --device docc --target=none
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        # sequential:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --device docc --target=sequential
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        openmp:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --device docc --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: float }
        cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/pooling.py --device docc --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: float }

    # layer relu
    relu:
      energy: true
      measurements: 3
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
      variants:
        torch:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --torch
          tags: { framework: torch, device: cpu, model: openmp, precision: float, baseline: true }
        # none:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --device docc --target=none
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        # sequential:
        #   command: venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --device docc --target=sequential
        #   tags: { framework: docc, device: cpu, model: sequential, precision: float }
        openmp:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --device docc --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: float }
        cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/layers/relu.py --device docc --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: float }
