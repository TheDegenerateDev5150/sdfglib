on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

parameters:
  container: daisytuner/docc-run-env-llvm19-ubuntu-24.04:latest-amd64
  timeout: 120
  partitions:
    - chamomile

steps:
  build: |
    python3.11 -m venv venv
    . venv/bin/activate

    python -m pip install --upgrade pip
    pip install pybind11 pytest coverage black==25.9.0 build scikit-build-core
    pip install numpy scipy cupy-cuda12x transformers ml_dtypes

    pip install --no-build-isolation -e python/
    pip install --no-build-isolation -e mlir/

    pip install -r mlir/requirements.txt
    pip uninstall -y torch torchvision
    pip install torch torchvision --index-url https://download.pytorch.org/whl/cu126

    # Warm start
    export DOCC_CI=
    export DOCC_DEBUG=dump

    venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device cpu
    venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device cuda
    venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device docc --target=openmp
    venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device docc --target=cuda

    venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --n_runs=1 --device cpu --variant segformer --batch-size 16
    venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --n_runs=1 --device cuda --variant segformer --batch-size 16
    venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --n_runs=1 --device docc --target=openmp --variant segformer --batch-size 16
    venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --n_runs=1 --device docc --target=cuda --variant segformer --batch-size 16

  run:
    resnet18:
      energy: true
      env:
        DOCC_CI: ""
        DOCC_REUSE_BINARIES: 1
      variants:
        torch:
          command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device cpu
          tags: { framework: torch, device: cpu, model: openmp, precision: float, baseline: true }
        torch-cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device cuda
          tags: { framework: torch, device: gpu, model: cuda, precision: float, baseline: true }
        openmp:
          command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device docc --target=openmp
          tags: { framework: docc, device: cpu, model: openmp, precision: float }
        cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device docc --target=cuda
          tags: { framework: docc, device: gpu, model: cuda, precision: float }
    segformer:
      energy: true
      env:
        DOCC_CI: ""
        DOCC_REUSE_BINARIES: 1
      variants:
        torch:
          command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --device cpu --n_runs=1 --variant segformer --batch-size 16
          tags: { framework: torch, device: cpu, model: openmp, precision: float, baseline: true }
        torch-cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --device cuda --n_runs=1 --variant segformer --batch-size 16
          tags: { framework: torch, device: gpu, model: cuda, precision: float, baseline: true }
        openmp:
          command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --device docc --target=openmp --n_runs=1 --variant segformer --batch-size 16
          tags: { framework: docc, device: cpu, model: openmp, precision: float }
        cuda:
          command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --device docc --target=cuda --n_runs=1 --variant segformer --batch-size 16
          tags: { framework: docc, device: gpu, model: cuda, precision: float }
