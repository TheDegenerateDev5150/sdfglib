on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

parameters:
  container: daisytuner/docc-run-env-llvm19-ubuntu-24.04:latest-amd64
  timeout: 120
  partitions:
    - chamomile

steps:
  build: |
    python3.11 -m venv venv
    . venv/bin/activate

    python -m pip install --upgrade pip
    pip install pybind11 pytest coverage black==25.9.0 build scikit-build-core
    pip install numpy scipy cupy-cuda12x transformers ml_dtypes

    pip install --no-build-isolation -e python/
    pip install --no-build-isolation -e mlir/

    pip install -r mlir/requirements.txt
    pip uninstall -y torch torchvision
    pip install torch torchvision --index-url https://download.pytorch.org/whl/cu126

    # Warm start

    venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device cpu
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device docc --target=none
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device docc --target=sequential
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device docc --target=openmp
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --n_runs=1 --device docc --target=cuda

    venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --n_runs=1 --device cpu --variant segformer --batch-size 16
    venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --n_runs=1 --device cuda --variant segformer --batch-size 16
    DOCC_CI=regions venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --n_runs=1 --device docc --target=cuda --variant segformer --batch-size 16

  run:

    # model resnet18

    resnet18_torch:
      command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device cpu
      energy: true
    resnet18_docc_none:
      command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device docc --target=none
      energy: true
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
    resnet18_docc_sequential:
      command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device docc --target=sequential
      energy: true
      env:
        DOCC_CI: true
        DOCC_REUSE_BINARIES: 1
    resnet18_docc_openmp:
      command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device docc --target=openmp
      energy: true
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
    resnet18_docc_cuda:
      command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/resnet18.py --device docc --target=cuda
      energy: true
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
    # model segformer
    segformer_torch:
      command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --device cpu --variant segformer --batch-size 16
      energy: true
    segformer_torch_cuda:
      command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --device cuda --variant segformer --batch-size 16
      energy: true
    segformer_docc_cuda:
      command: venv/bin/python3 mlir/benchmarks/torch/model_zoo/segformer.py --device docc --target=cuda --variant segformer --batch-size 16
      energy: true
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1
