on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

parameters:
  container: daisytuner/docc-build-env-llvm19-base:latest-amd64
  timeout: 120
  partitions:
    - chamomile

steps:
  build: |
    add-apt-repository ppa:deadsnakes/ppa -y
    apt-get update

    apt-get install -y python3.11 python3.11-dev python3.11-venv

    python3.11 -m venv venv
    . venv/bin/activate

    python -m pip install --upgrade pip
    pip install pybind11 pytest coverage black==25.9.0 build scikit-build-core
    pip install numpy scipy

    pip install --no-build-isolation -v -e python/
    pip install --no-build-isolation -v -e mlir/

    pip install torch-mlir torchvision --extra-index-url https://download.pytorch.org/whl/cpu -f https://github.com/llvm/torch-mlir-release/releases/expanded_assets/dev-wheels

  run:

    # layer batchnorm

    layer_batchnorm_torch:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --torch
      energy: true
      env:
        DOCC_CI: regions

    layer_batchnorm_build_none:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --docc --target=none --n_runs=1
      energy: true
      env:
        DOCC_CI: regions
    layer_batchnorm_run_none:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --docc --target=none
      energy: true
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1

    layer_batchnorm_build_sequential:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --docc --target=sequential --n_runs=1
      energy: true
      env:
        DOCC_CI: regions
    layer_batchnorm_run_sequential:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --docc --target=sequential
      energy: true
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1

    layer_batchnorm_build_openmp:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --docc --target=openmp --n_runs=1
      energy: true
      env:
        DOCC_CI: regions
    layer_batchnorm_run_openmp:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --docc --target=openmp
      energy: true
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1

    layer_batchnorm_build_cuda:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --docc --target=cuda --n_runs=1
      energy: true
      env:
        DOCC_CI: regions
    layer_batchnorm_run_cuda:
      command: venv/bin/python3 mlir/benchmarks/torch/layers/batchnorm.py --docc --target=cuda
      energy: true
      env:
        DOCC_CI: regions
        DOCC_REUSE_BINARIES: 1

    # layer conv2d

